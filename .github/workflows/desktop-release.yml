name: desktop-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  NODE_VERSION: '25'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  RELEASE_CONFIG_PATH: src-tauri/tauri.release.conf.json

jobs:
  verify:
    name: Verify Build Inputs
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Check desktop backend
        run: npm run desktop:check

  create_release:
    name: Prepare Release
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Resolve release target
        id: release
        uses: actions/github-script@v7
        with:
          script: |
            const isTagPush = context.eventName === 'push' && context.ref.startsWith('refs/tags/')
            const tagName = isTagPush ? context.ref.replace('refs/tags/', '') : ''
            core.setOutput('tag_name', tagName)

            if (!isTagPush) {
              core.setOutput('release_id', '')
              return
            }

            const owner = context.repo.owner
            const repo = context.repo.repo

            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: tagName
              })
              core.setOutput('release_id', String(release.data.id))
              return
            } catch (error) {
              if (error.status !== 404) {
                throw error
              }
            }

            const release = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tagName,
              name: tagName,
              draft: false,
              prerelease: tagName.includes('-'),
              generate_release_notes: true
            })

            core.setOutput('release_id', String(release.data.id))

  build:
    name: Build ${{ matrix.label }}
    needs:
      - verify
      - create_release
    if: ${{ needs.verify.result == 'success' && needs.create_release.result == 'success' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows Installer
            os: windows-latest
            args: --bundles nsis
            release_args: --bundles nsis --config src-tauri/tauri.release.conf.json
            include_updater_json: true
            upload_plain_binary: false
            artifact_name: windows-installer
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe
          - label: Windows Portable
            os: windows-latest
            args: --no-bundle
            release_args: --no-bundle
            include_updater_json: false
            upload_plain_binary: false
            artifact_name: windows-portable
            artifact_path: src-tauri/target/release/Mind.Map.Desktop_*.exe
          - label: macOS Bundle
            os: macos-latest
            args: --bundles app,dmg
            release_args: --bundles app,dmg --config src-tauri/tauri.release.conf.json
            include_updater_json: true
            upload_plain_binary: false
            dmg_ignore_ci: 'true'
            artifact_name: macos-bundle
            artifact_path: |
              src-tauri/target/release/bundle/macos/*.app
              src-tauri/target/release/bundle/dmg/*.dmg
          - label: Linux Bundle
            os: ubuntu-22.04
            args: --bundles deb,appimage
            release_args: --bundles deb,appimage --config src-tauri/tauri.release.conf.json
            include_updater_json: true
            upload_plain_binary: false
            artifact_name: linux-bundle
            artifact_path: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Linux desktop dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Validate updater signing secrets
        if: needs.create_release.outputs.release_id != '' && matrix.include_updater_json
        shell: bash
        run: |
          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "Missing TAURI_SIGNING_PRIVATE_KEY secret"
            exit 1
          fi

      - name: Build desktop bundles for release
        if: needs.create_release.outputs.release_id != ''
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUNDLER_DMG_IGNORE_CI: ${{ matrix.dmg_ignore_ci || '' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          args: ${{ matrix.release_args }}
          releaseId: ${{ needs.create_release.outputs.release_id }}
          tagName: ${{ needs.create_release.outputs.tag_name }}
          assetNamePattern: '[name]_[version]_[platform]_[arch][setup][ext]'
          uploadPlainBinary: ${{ matrix.upload_plain_binary }}
          includeUpdaterJson: ${{ matrix.include_updater_json }}

      - name: Build desktop bundles for workflow artifacts
        if: needs.create_release.outputs.release_id == ''
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUNDLER_DMG_IGNORE_CI: ${{ matrix.dmg_ignore_ci || '' }}
        with:
          projectPath: .
          args: ${{ matrix.args }}
          assetNamePattern: '[name]_[version]_[platform]_[arch][setup][ext]'
          uploadPlainBinary: ${{ matrix.upload_plain_binary }}
          includeUpdaterJson: false

      - name: Normalize Windows portable asset name
        id: portable_asset
        if: matrix.label == 'Windows Portable'
        shell: pwsh
        run: |
          $version = (Get-Content 'package.json' | ConvertFrom-Json).version
          $source = 'src-tauri/target/release/mind-map-desktop.exe'
          $target = "src-tauri/target/release/Mind.Map.Desktop_${version}_windows_x64.exe"
          Copy-Item $source $target -Force
          "path=$target" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "name=$(Split-Path $target -Leaf)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload Windows portable release asset
        if: matrix.label == 'Windows Portable' && needs.create_release.outputs.release_id != ''
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.create_release.outputs.tag_name }}" "${{ steps.portable_asset.outputs.path }}" --clobber

      - name: Upload workflow artifact
        if: success() && matrix.label != 'Windows Portable'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          compression-level: 0
          path: ${{ matrix.artifact_path }}

      - name: Upload Windows portable workflow artifact
        if: success() && matrix.label == 'Windows Portable'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          compression-level: 0
          path: ${{ steps.portable_asset.outputs.path }}
