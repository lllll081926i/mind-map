name: desktop-release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: Existing release tag to rebuild, for example v0.2.3
        required: false
        type: string
      build_ref:
        description: Git ref to build from, for example main or a commit SHA
        required: false
        type: string

concurrency:
  group: desktop-release-${{ inputs.tag_name != '' && inputs.tag_name || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  NODE_VERSION: '25'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  RELEASE_CONFIG_PATH: src-tauri/tauri.release.conf.json

jobs:
  verify:
    name: Verify Build Inputs
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.build_ref != '' && inputs.build_ref || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Show build context
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p 'require("./package.json").version')
          echo "event=${{ github.event_name }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.sha=${{ github.sha }}"
          echo "inputs.tag_name=${{ inputs.tag_name || '' }}"
          echo "inputs.build_ref=${{ inputs.build_ref || '' }}"
          echo "checked_out_commit=$(git rev-parse HEAD)"
          echo "package_version=$PACKAGE_VERSION"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Verify release tag matches package version
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p 'require("./package.json").version')
          EXPECTED_TAG="v${PACKAGE_VERSION}"
          RELEASE_TAG="${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_type == 'tag' && github.ref_name || '' }}"

          if [ -z "$RELEASE_TAG" ]; then
            echo "No release tag requested for this run."
            exit 0
          fi

          if [ "$RELEASE_TAG" != "$EXPECTED_TAG" ]; then
            echo "::error::Release tag $RELEASE_TAG does not match package.json version $EXPECTED_TAG"
            exit 1
          fi

          echo "Release tag check passed: $RELEASE_TAG"

      - name: Build frontend app
        run: npm run frontend:build

      - name: Check desktop backend
        run: npm run desktop:check

  create_release:
    name: Prepare Release
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.release.outputs.release_id }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - name: Resolve release target
        id: release
        uses: actions/github-script@v8
        with:
          script: |
            const dispatchTagName = (context.payload.inputs?.tag_name || '').trim()
            const pushTagName = context.eventName === 'push' && context.ref.startsWith('refs/tags/')
              ? context.ref.replace('refs/tags/', '')
              : ''
            const tagName = dispatchTagName || pushTagName
            core.setOutput('tag_name', tagName)

            if (!tagName) {
              core.setOutput('release_id', '')
              return
            }

            const owner = context.repo.owner
            const repo = context.repo.repo

            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: tagName
              })
              core.setOutput('release_id', String(release.data.id))
              return
            } catch (error) {
              if (error.status !== 404) {
                throw error
              }
            }

            const release = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tagName,
              name: tagName,
              draft: false,
              prerelease: tagName.includes('-'),
              generate_release_notes: true
            })

            core.setOutput('release_id', String(release.data.id))

  build:
    name: Build ${{ matrix.label }}
    needs:
      - verify
      - create_release
    if: ${{ needs.verify.result == 'success' && needs.create_release.result == 'success' }}
    runs-on: ${{ matrix.os }}
    env:
      HAS_UPDATER_SECRETS: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY != '' && secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows Installer
            os: windows-latest
            args: --bundles nsis
            release_args: --bundles nsis --config src-tauri/tauri.release.conf.json
            include_updater_json: true
            upload_plain_binary: false
            target_triple: ''
            portable_asset_suffix: ''
            portable_source_path: ''
            artifact_name: windows-installer
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe
            release_asset_regex: ^MindMap_.*_windows_x64-setup\.exe(\.sig)?$
          - label: Windows Portable
            os: windows-latest
            args: --no-bundle
            release_args: --no-bundle
            include_updater_json: false
            upload_plain_binary: false
            target_triple: ''
            portable_asset_suffix: windows_x64
            portable_source_path: src-tauri/target/release/mind-map-desktop.exe
            artifact_name: windows-portable
            artifact_path: src-tauri/target/release/MindMap_*.exe
            release_asset_regex: ^MindMap_.*_windows_x64\.exe$
          - label: Windows ARM64 Installer
            os: windows-latest
            args: --bundles nsis --target aarch64-pc-windows-msvc
            release_args: --bundles nsis --target aarch64-pc-windows-msvc --config src-tauri/tauri.release.conf.json
            include_updater_json: true
            upload_plain_binary: false
            target_triple: aarch64-pc-windows-msvc
            portable_asset_suffix: ''
            portable_source_path: ''
            artifact_name: windows-arm64-installer
            artifact_path: src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/*.exe
            release_asset_regex: ^MindMap_.*_windows_arm64-setup\.exe(\.sig)?$
          - label: Windows ARM64 Portable
            os: windows-latest
            args: --no-bundle --target aarch64-pc-windows-msvc
            release_args: --no-bundle --target aarch64-pc-windows-msvc
            include_updater_json: false
            upload_plain_binary: false
            target_triple: aarch64-pc-windows-msvc
            portable_asset_suffix: windows_arm64
            portable_source_path: src-tauri/target/aarch64-pc-windows-msvc/release/mind-map-desktop.exe
            artifact_name: windows-arm64-portable
            artifact_path: src-tauri/target/aarch64-pc-windows-msvc/release/MindMap_*.exe
            release_asset_regex: ^MindMap_.*_windows_arm64\.exe$
          - label: macOS Bundle
            os: macos-latest
            args: --bundles app,dmg
            release_args: --bundles app,dmg --config src-tauri/tauri.release.conf.json
            include_updater_json: true
            upload_plain_binary: false
            target_triple: ''
            portable_asset_suffix: ''
            portable_source_path: ''
            dmg_ignore_ci: 'true'
            artifact_name: macos-bundle
            artifact_path: |
              src-tauri/target/release/bundle/macos/*.app
              src-tauri/target/release/bundle/dmg/*.dmg
            release_asset_regex: ^MindMap_.*_darwin_aarch64\.(app\.tar\.gz|dmg)(\.sig)?$
          - label: Linux Bundle
            os: ubuntu-22.04
            args: --bundles deb,appimage
            release_args: --bundles deb,appimage --config src-tauri/tauri.release.conf.json
            include_updater_json: true
            upload_plain_binary: false
            target_triple: ''
            portable_asset_suffix: ''
            portable_source_path: ''
            artifact_name: linux-bundle
            artifact_path: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
            release_asset_regex: ^MindMap_.*_linux_amd64\.(AppImage|deb)(\.sig)?$

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.build_ref != '' && inputs.build_ref || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Show build context
        shell: bash
        run: |
          PACKAGE_VERSION=$(node -p 'require("./package.json").version')
          echo "matrix.label=${{ matrix.label }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.sha=${{ github.sha }}"
          echo "inputs.tag_name=${{ inputs.tag_name || '' }}"
          echo "inputs.build_ref=${{ inputs.build_ref || '' }}"
          echo "checked_out_commit=$(git rev-parse HEAD)"
          echo "package_version=$PACKAGE_VERSION"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Windows ARM64 build environment
        if: matrix.target_triple == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          $vswhere = Join-Path ${env:ProgramFiles(x86)} 'Microsoft Visual Studio\Installer\vswhere.exe'
          $installationPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.ARM64 -property installationPath
          if (-not $installationPath) {
            throw 'Visual Studio ARM64 build tools not found on runner.'
          }

          $devCmd = Join-Path $installationPath 'Common7\Tools\VsDevCmd.bat'
          if (-not (Test-Path $devCmd)) {
            throw "VsDevCmd.bat not found: $devCmd"
          }

          $varsToExport = @(
            'PATH',
            'INCLUDE',
            'LIB',
            'LIBPATH',
            'VCINSTALLDIR',
            'VCToolsInstallDir',
            'VCToolsVersion',
            'VSINSTALLDIR',
            'VisualStudioVersion',
            'WindowsLibPath',
            'WindowsSdkBinPath',
            'WindowsSdkDir',
            'WindowsSdkVerBinPath',
            'WindowsSDKLibVersion',
            'WindowsSDKVersion',
            'UniversalCRTSdkDir',
            'UCRTVersion',
            'ExtensionSdkDir',
            'VSCMD_ARG_HOST_ARCH',
            'VSCMD_ARG_TGT_ARCH'
          )

          $environmentLines = cmd /c "`"$devCmd`" -host_arch=amd64 -arch=arm64 && set"
          foreach ($entry in $environmentLines) {
            if ($entry -notmatch '^(.*?)=(.*)$') {
              continue
            }

            $name = $matches[1]
            $value = $matches[2]
            if ($name -in $varsToExport) {
              "$name=$value" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
            }
          }

      - name: Install Windows ARM64 Rust target
        if: matrix.target_triple == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: rustup target add ${{ matrix.target_triple }}

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Linux desktop dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Warn when updater signing secrets are missing
        if: needs.create_release.outputs.release_id != '' && matrix.include_updater_json && env.HAS_UPDATER_SECRETS != 'true'
        shell: bash
        run: |
          echo "::warning::Skipping updater artifacts for ${{ matrix.label }} because TAURI_SIGNING_PRIVATE_KEY or TAURI_SIGNING_PRIVATE_KEY_PASSWORD is not configured."

      - name: Remove existing release assets for current target
        if: needs.create_release.outputs.release_id != ''
        uses: actions/github-script@v8
        env:
          RELEASE_ID: ${{ needs.create_release.outputs.release_id }}
          ASSET_REGEX: ${{ matrix.release_asset_regex }}
        with:
          script: |
            const releaseId = Number(process.env.RELEASE_ID)
            const assetRegex = new RegExp(process.env.ASSET_REGEX)
            const owner = context.repo.owner
            const repo = context.repo.repo
            const { data: assets } = await github.rest.repos.listReleaseAssets({
              owner,
              repo,
              release_id: releaseId,
              per_page: 100
            })

            for (const asset of assets) {
              if (asset.name !== 'latest.json' && !assetRegex.test(asset.name)) {
                continue
              }
              core.info(`Deleting existing asset: ${asset.name}`)
              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: asset.id
              })
            }

      - name: Build desktop bundles for release with updater artifacts
        if: matrix.portable_asset_suffix == '' && needs.create_release.outputs.release_id != '' && matrix.include_updater_json && env.HAS_UPDATER_SECRETS == 'true'
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUNDLER_DMG_IGNORE_CI: ${{ matrix.dmg_ignore_ci || '' }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: .
          args: ${{ matrix.release_args }}
          releaseId: ${{ needs.create_release.outputs.release_id }}
          tagName: ${{ needs.create_release.outputs.tag_name }}
          assetNamePattern: '[name]_[version]_[platform]_[arch][setup][ext]'
          uploadPlainBinary: ${{ matrix.upload_plain_binary }}
          includeUpdaterJson: false

      - name: Build desktop bundles for release without updater artifacts
        if: matrix.portable_asset_suffix == '' && needs.create_release.outputs.release_id != '' && (!matrix.include_updater_json || env.HAS_UPDATER_SECRETS != 'true')
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUNDLER_DMG_IGNORE_CI: ${{ matrix.dmg_ignore_ci || '' }}
        with:
          projectPath: .
          args: ${{ matrix.args }}
          releaseId: ${{ needs.create_release.outputs.release_id }}
          tagName: ${{ needs.create_release.outputs.tag_name }}
          assetNamePattern: '[name]_[version]_[platform]_[arch][setup][ext]'
          uploadPlainBinary: ${{ matrix.upload_plain_binary }}
          includeUpdaterJson: false

      - name: Build desktop bundles for workflow artifacts
        if: matrix.portable_asset_suffix == '' && needs.create_release.outputs.release_id == ''
        uses: tauri-apps/tauri-action@v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_BUNDLER_DMG_IGNORE_CI: ${{ matrix.dmg_ignore_ci || '' }}
        with:
          projectPath: .
          args: ${{ matrix.args }}
          assetNamePattern: '[name]_[version]_[platform]_[arch][setup][ext]'
          uploadPlainBinary: ${{ matrix.upload_plain_binary }}
          includeUpdaterJson: false

      - name: Build Windows portable binary
        if: matrix.portable_asset_suffix != ''
        shell: pwsh
        run: |
          npx tauri build ${{ matrix.args }}

      - name: Normalize Windows portable asset name
        id: portable_asset
        if: matrix.portable_asset_suffix != ''
        shell: pwsh
        run: |
          $version = (Get-Content 'package.json' | ConvertFrom-Json).version
          $source = "${{ matrix.portable_source_path }}"
          if (-not (Test-Path $source)) {
            throw "Portable source binary not found: $source"
          }
          $targetDir = Split-Path $source -Parent
          $target = Join-Path $targetDir "MindMap_${version}_${{ matrix.portable_asset_suffix }}.exe"
          Copy-Item $source $target -Force
          if (-not (Test-Path $target)) {
            throw "Portable target binary was not created: $target"
          }
          $normalizedTarget = $target -replace '\\', '/'
          "path=$normalizedTarget" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "name=$(Split-Path $target -Leaf)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Verify Windows portable artifact files
        if: matrix.portable_asset_suffix != ''
        shell: pwsh
        run: |
          Write-Host "Expected artifact pattern: ${{ matrix.artifact_path }}"
          $files = Get-ChildItem -Path "${{ matrix.artifact_path }}" -ErrorAction SilentlyContinue
          if (-not $files) {
            throw "No portable artifacts matched pattern: ${{ matrix.artifact_path }}"
          }
          $files | ForEach-Object { Write-Host "Portable artifact: $($_.FullName)" }

      - name: Upload Windows portable release asset
        if: success() && matrix.portable_asset_suffix != '' && needs.create_release.outputs.release_id != ''
        uses: actions/github-script@v8
        env:
          ASSET_PATH: ${{ steps.portable_asset.outputs.path }}
          ASSET_NAME: ${{ steps.portable_asset.outputs.name }}
          RELEASE_ID: ${{ needs.create_release.outputs.release_id }}
        with:
          script: |
            const fs = require('fs')
            const path = process.env.ASSET_PATH
            const name = process.env.ASSET_NAME
            const releaseId = Number(process.env.RELEASE_ID)
            const owner = context.repo.owner
            const repo = context.repo.repo

            const { data: assets } = await github.rest.repos.listReleaseAssets({
              owner,
              repo,
              release_id: releaseId,
              per_page: 100
            })

            const existing = assets.find(asset => asset.name === name)
            if (existing) {
              await github.rest.repos.deleteReleaseAsset({
                owner,
                repo,
                asset_id: existing.id
              })
            }

            await github.rest.repos.uploadReleaseAsset({
              owner,
              repo,
              release_id: releaseId,
              name,
              data: fs.readFileSync(path)
            })

      - name: Upload workflow artifact
        if: success() && matrix.portable_asset_suffix == ''
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          compression-level: 0
          path: ${{ matrix.artifact_path }}

      - name: Upload Windows portable workflow artifact
        if: success() && matrix.portable_asset_suffix != ''
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          if-no-files-found: error
          compression-level: 0
          path: ${{ matrix.artifact_path }}
